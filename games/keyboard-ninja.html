<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Code Match Puzzle | Kidventor</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter,system-ui;
background:linear-gradient(135deg,#0f172a,#1e1b4b);
color:white;
overflow:hidden;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:18px;
border-radius:18px;
cursor:pointer;
transition:.2s;
text-align:center;
font-weight:900;
}

.card:hover{transform:scale(1.05)}

.selected{
background:#6366f1 !important;
}

.correct{
background:#10b981 !important;
}

.wrong{
background:#ef4444 !important;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.center{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
padding:20px;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- HUD -->
<div class="fixed top-0 left-0 right-0 p-4 flex justify-between text-sm font-black">
<div>Score: <span id="score">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Stars: ⭐ <span id="stars">0</span></div>
</div>

<!-- START -->
<div id="start" class="center">
<h1 class="text-4xl font-black">CODE MATCH PUZZLE</h1>
<p class="mt-3 text-indigo-300">Match the correct pairs</p>
<button onclick="startGame()" class="mt-6 px-8 py-4 bg-indigo-600 rounded-xl font-black">
START
</button>
</div>

<!-- GAME -->
<div id="game" class="hidden center">
<div class="grid w-full max-w-xl" id="board"></div>
</div>

<!-- END -->
<div id="end" class="hidden center">
<h1 class="text-4xl font-black">Well Done!</h1>
<p class="mt-3">Final Score: <span id="final"></span></p>
<button onclick="location.reload()" class="mt-6 px-8 py-4 bg-indigo-600 rounded-xl font-black">
Play Again
</button>
</div>

<script>

const levels = [
{
pairs:[
["CPU","Brain of computer"],
["Keyboard","Typing device"],
["Mouse","Pointer device"],
["Loop","Repeats actions"]
]
}
];

let score=0;
let level=0;
let selected=null;
let matched=0;

function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
loadLevel();
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function loadLevel(){
const board=document.getElementById("board");
board.innerHTML="";

let items=[];

levels[level].pairs.forEach(p=>{
items.push({text:p[0],match:p[1],type:"key"});
items.push({text:p[1],match:p[0],type:"value"});
});

items=shuffle(items);

items.forEach((item,i)=>{
const div=document.createElement("div");
div.className="card";
div.textContent=item.text;

div.onclick=()=>{
handleClick(div,item);
};

board.appendChild(div);
});
}

function handleClick(div,item){

if(div.classList.contains("correct")) return;

if(!selected){
selected={div,item};
div.classList.add("selected");
return;
}

if(selected.div===div) return;

// match check
if(selected.item.match===item.text){
div.classList.add("correct");
selected.div.classList.add("correct");

score+=10;
matched++;

updateHUD();

if(matched===levels[level].pairs.length){
setTimeout(()=>{
endGame();
},500);
}

}else{
div.classList.add("wrong");
selected.div.classList.add("wrong");

setTimeout(()=>{
div.classList.remove("wrong","selected");
selected.div.classList.remove("wrong","selected");
},500);
}

selected=null;
}

function updateHUD(){
document.getElementById("score").textContent=score;
document.getElementById("stars").textContent=Math.floor(score/10);
}

function endGame(){
document.getElementById("game").classList.add("hidden");
document.getElementById("end").classList.remove("hidden");
document.getElementById("final").textContent=score;
}

</script>

</body>
</html>






<!--<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Keyboard Ninja V2 | Kidventor</title>

<style>

<body>

<!-- HUD --
<div class="fixed top-0 left-0 right-0 z-50 p-4">
<div class="max-w-6xl mx-auto flex justify-between gap-4 items-center">

<div class="flex gap-3">
<div class="panel px-5 py-3 rounded-2xl text-white">
<div class="text-[10px] uppercase font-black text-indigo-300">Score</div>
<div id="score" class="text-2xl font-black">0</div>
</div>

<div class="panel px-5 py-3 rounded-2xl text-white">
<div class="text-[10px] uppercase font-black text-amber-300">Stars</div>
<div id="stars" class="text-2xl font-black">0</div>
</div>
</div>

<div class="text-center">
<div id="level" class="text-white text-xl font-black">LEVEL 1</div>
<div id="combo" class="text-emerald-300 text-sm font-black"></div>
</div>

<div class="text-[10px] uppercase font-black text-rose-300">Lives</div>
<div id="lives" class="text-xl font-black">❤️❤️❤️</div>

</div>
</div>

<!-- Start Screen --
<div id="startScreen" class="fixed inset-0 z-40 flex items-center justify-center bg-black/70">
<div class="text-center px-6 floaty">
<h1 class="text-white text-6xl md:text-7xl font-black">KEYBOARD <span class="text-indigo-500">NINJA</span></h1>

<button onclick="startGame()" class="mt-8 px-10 py-5 rounded-2xl bg-indigo-600 text-white font-black text-xl hover:bg-indigo-700">
START MISSION

<!-- Arena --
<div id="gameArea" class="fixed inset-0"></div>

<!-- Mobile Keys --

<!-- Game Over --
<div id="gameOver" class="hidden fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-6">

<div class="text-6xl">🏆</div>
<h2 class="text-4xl font-black mt-4">Mission Complete</h2>

<div class="mt-8 space-y-3">
<div class="bg-slate-100 rounded-xl p-4 flex justify-between">
<span class="font-bold">Final Score</span>
<span id="finalScore" class="font-black">0</span>
</div>

<div class="bg-indigo-600 text-white rounded-xl p-4 flex justify-between">
<span class="font-bold">Stars Won</span>
<span id="finalStars" class="font-black">0</span>
</div>
</div>

<button onclick="location.reload()" class="mt-8 w-full py-4 rounded-xl bg-slate-900 text-white font-black hover:bg-indigo-600">
PLAY AGAIN
</button>
</div>

<script>
const area = document.getElementById("gameArea");

let score=0;
let stars=0;
let lives=3;
let level=1;
let combo=0;
let speed=2.2;
let started=false;
let ended=false;
let spawnRate=900;
let active=[];
let timer;

function updateHUD(){
scoreEl.textContent=score;
starsEl.textContent=stars;
levelEl.textContent="LEVEL "+level;
comboEl.textContent=combo>1?"COMBO x"+combo:"";

let hearts="";
for(let i=0;i<3;i++) hearts += i<lives ? "❤️":"🖤";
livesEl.textContent=hearts;
}

const scoreEl=document.getElementById("score");
const starsEl=document.getElementById("stars");
const levelEl=document.getElementById("level");
const comboEl=document.getElementById("combo");
const livesEl=document.getElementById("lives");

function startGame(){
if(started)return;
started=true;
document.getElementById("startScreen").classList.add("hidden");
spawnLoop();
requestAnimationFrame(loop);
}

function spawnLoop(){
timer=setInterval(spawnLetter,spawnRate);
}

function restartSpawner(){
clearInterval(timer);
spawnLoop();
}

function randomLetter(){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
return chars[Math.floor(Math.random()*chars.length)];
}

function spawnLetter(){
if(ended)return;

let type="normal";
let rand=Math.random();

if(rand<0.08) type="bomb";
else if(rand<0.14) type="freeze";
else if(rand<0.22) type="star";

const el=document.createElement("div");
el.className="letter "+type;
el.textContent= type==="bomb" ? "💣" :
type==="freeze" ? "❄️" :
type==="star" ? "⭐" :
randomLetter();

const x=Math.random()*(window.innerWidth-80);
el.style.left=x+"px";
el.style.top="-80px";

area.appendChild(el);

active.push({
char:el.textContent,
type,
el,
x,
y:-80
});
}

function loop(){
if(ended)return;

for(let i=active.length-1;i>=0;i--){
let a=active[i];
a.y += speed;
a.el.style.top=a.y+"px";

if(a.y > window.innerHeight){
a.el.remove();
active.splice(i,1);

if(a.type==="normal"){
lives--;
combo=0;
if(lives<=0){endGame();return;}
}
updateHUD();
}
}

requestAnimationFrame(loop);
}

function hitEffect(el){
el.classList.add("hit");
setTimeout(()=>el.remove(),120);
}

function levelCheck(){
if(score>=50 && level===1){
level=2; speed=3; spawnRate=700; restartSpawner();
}
if(score>=120 && level===2){
level=3; speed=4; spawnRate=550; restartSpawner();
}
if(score>=220 && level===3){
level=4; speed=5; spawnRate=450; restartSpawner();
}
}

function processKey(key){
if(!started || ended)return;

key=key.toUpperCase();

for(let i=0;i<active.length;i++){
let a=active[i];

if(
(a.type==="normal" && a.char===key) ||
(a.type!=="normal" && key===" ")
){

if(a.type==="bomb"){
combo=0;
lives--;
if(lives<=0){endGame();return;}
}

else if(a.type==="freeze"){
speed=Math.max(1.5,speed-1);
setTimeout(()=>speed+=1,4000);
score+=10;
stars+=2;
combo++;
}

else if(a.type==="star"){
score+=20;
stars+=5;
combo++;
}

else{
combo++;
score += 10*combo;
stars += 1;
}

hitEffect(a.el);
active.splice(i,1);

levelCheck();
updateHUD();
return;
}
}

combo=0;
updateHUD();
}

document.addEventListener("keydown",(e)=>{
if(!started){startGame();return;}
processKey(e.key===" " ? " " : e.key);
});

function endGame(){
ended=true;
clearInterval(timer);

document.getElementById("finalScore").textContent=score;
document.getElementById("finalStars").textContent=stars;
document.getElementById("gameOver").classList.remove("hidden");

let saved=Number(localStorage.getItem("kidventorStars"))||0;
localStorage.setItem("kidventorStars",saved+stars);
}

/* mobile keyboard */
const keys="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const mobile=document.getElementById("mobileKeys");

keys.split("").forEach(k=>{
let b=document.createElement("button");
b.textContent=k;
b.onclick=()=>processKey(k);
mobile.appendChild(b);
});

let space=document.createElement("button");
space.textContent="⭐";
space.className="col-span-6 bg-indigo-600 text-white";
space.onclick=()=>processKey(" ");
mobile.appendChild(space);

updateHUD();
</script>

</body>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        background: radial-gradient(circle at center, #1e1b4b, #0f172a);
    }

    /* Upgraded Letter Style */
    .letter {
        position: absolute;
        width: 70px;
        height: 70px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;

        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
</style>
</head>

<body>

<div class="fixed top-0 inset-x-0 z-50 px-6 py-6">
    <div class="content-container max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex gap-4">
            <div class="panel px-6 py-3 rounded-2xl text-white">
                <p class="text-[10px] uppercase font-black tracking-widest text-indigo-300">Score</p>
                <p id="score" class="text-3xl font-black">0</p>
            </div>
            <div class="panel px-6 py-3 rounded-2xl text-white">
                <p class="text-[10px] uppercase font-black tracking-widest text-emerald-300">Stars</p>
                <p id="currentStars" class="text-3xl font-black text-amber-400">0</p>

            <p id="comboText" class="text-4xl font-black text-white italic italic">X2</p>

        </div>

            <div class="panel px-6 py-3 rounded-2xl text-white text-right">
                <p class="text-[10px] uppercase font-black tracking-widest text-rose-300">Lives</p>

        <h2 class="text-4xl font-black text-slate-900 leading-none">Mission Complete</h2>
        <p class="mt-2 text-slate-400 font-medium">You protected the digital scroll!</p>

            RETRY MISSION
        </button>
    </div>
</div>

<script>
    const gameArea = document.getElementById("gameArea");
    const startScreen = document.getElementById("startScreen");
    
    let score = 0;
    let lives = 3;
    let combo = 0;
    let speed = 2.0;
    let started = false;
    let ended = false;
    let activeLetters = [];

    function updateUI() {
        document.getElementById("score").textContent = score;
        document.getElementById("currentStars").textContent = Math.floor(score / 5);
        let hearts = "";
        for(let i=0; i<3; i++) hearts += (i < lives) ? "❤️" : "🖤";
        document.getElementById("lives").textContent = hearts;
        
        const comboContainer = document.getElementById("comboContainer");
        if (combo > 2) {
            comboContainer.classList.remove("hidden");
            document.getElementById("comboText").textContent = `X${Math.floor(combo/2)}`;
        } else {
            comboContainer.classList.add("hidden");
        }
    }

    function spawnLetter() {
        if (ended || !started) return;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const char = chars[Math.floor(Math.random() * chars.length)];
        const el = document.createElement("div");
        el.className = "letter";
        el.textContent = char;
        
        const x = Math.random() * (window.innerWidth - 100) + 20;
        el.style.left = x + "px";
        el.style.top = "-100px";
        
        gameArea.appendChild(el);
        activeLetters.push({ char, el, x, y: -100 });
        speed += 0.02;
    }

    function gameLoop() {
        if (ended) return;
        for (let i = activeLetters.length - 1; i >= 0; i--) {
            const item = activeLetters[i];
            item.y += speed;
            item.el.style.top = item.y + "px";

            if (item.y > window.innerHeight) {
                item.el.remove();
                activeLetters.splice(i, 1);
                lives--;
                combo = 0;
                updateUI();
                if (lives <= 0) { endGame(); return; }
            }
        }
        requestAnimationFrame(gameLoop);
    }

    // --- THE FIX: RELIABLE START FUNCTION ---
    function initiateMission() {
        if (started) return;
        started = true;
        startScreen.classList.add("hidden");
        updateUI();
        setInterval(spawnLetter, 900);
        gameLoop();
        console.log("Mission Started!");
    }

    // Listen for keys
    document.addEventListener("keydown", (e) => {
        if (!started) {
            initiateMission();
            return;
        }
        
        const key = e.key.toUpperCase();
        let hitFound = false;

        for (let i = 0; i < activeLetters.length; i++) {
            if (activeLetters[i].char === key) {
                const hit = activeLetters[i];
                hit.el.classList.add("hit");
                setTimeout(() => hit.el.remove(), 100);
                activeLetters.splice(i, 1);
                combo++;
                score += (10 * Math.max(1, Math.floor(combo/2)));
                updateUI();
                hitFound = true;
                break;
            }
        }
        if (!hitFound) combo = 0;
    });

    // Backup: Start on click if key fails
    window.addEventListener("mousedown", initiateMission);

    function endGame() {
        if (ended) return;
        ended = true;
        document.getElementById("gameOver").classList.remove("hidden");
        document.getElementById("finalScore").textContent = score;
        const totalStars = Math.floor(score / 5);
        document.getElementById("starsWon").textContent = totalStars;
        
        let savedStars = Number(localStorage.getItem("kidventorStars")) || 0;
        localStorage.setItem("kidventorStars", savedStars + totalStars);
    }
</script>

</body>
</html>
