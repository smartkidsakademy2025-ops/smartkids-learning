<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words of the Old | Timmy's Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Plus+Jakarta+Sans:wght@800&display=swap');

        body { 
            margin: 0; padding: 0; 
            font-family: 'Crimson Pro', serif;
            background: #0f172a; /* Deep midnight blue */
            color: #1e293b;
            overflow-x: hidden;
        }

        #story-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .book-page { 
            max-width: 800px;
            width: 100%;
            background: #fff;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: justify;
            line-height: 1.8;
            font-size: 21px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .book-page h2 { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 32px;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 25px;
            border-left: 5px solid #f59e0b; /* Amber accent */
            padding-left: 20px;
        }

        .navigation {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
        }

        button { 
            padding: 10px 24px; 
            font-size: 13px; 
            font-weight: 800;
            cursor: pointer; 
            border: none;
            background: #0f172a;
            color: white;
            border-radius: 50px; 
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #f59e0b;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        .progress-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            z-index: 1000;
        }

        #bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #f59e0b, #fbbf24);
            transition: width 0.4s ease;
        }

        .meta-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px;
            font-weight: 800;
            color: #94a3b8;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .book-page { padding: 30px; font-size: 18px; }
            .navigation { width: 90%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="progress-indicator"><div id="bar"></div></div>

    <div id="story-container"></div>

    <div class="navigation">
        <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
        <button id="nextBtn" onclick="changePage(1)">Next →</button>
    </div>

    <script>
    const story = [
      {
        title: "The Dream of the Unknown",
        text: "Timmy lived in a peaceful village of green hills and whispering trees, but his heart lived in the clouds. Every morning, he watched the birds and wondered: 'Where does the sky end? What lies beyond the hills?' While others were content with the familiar, Timmy practiced saying 'Hello' in five different languages and kept a map under his pillow. He knew that to grow, one must be willing to step into the unknown. His courage wasn't the absence of fear, but the presence of curiosity."
      },
      {
        title: "The Spark of Departure",
        text: "One sunny morning, Timmy packed his tiny backpack with a slice of bread and his lucky marble. With a final hug for his mother, he stepped onto the dusty path beyond the village. Every step felt like a drumbeat in his chest. The trees grew taller, and the sky grew wider. He realized that the world doesn't come to you; you must go to the world. With his map as his guide and hope as his fuel, Timmy began the greatest update of his life."
      },
      {
        title: "A Taste of the World",
        text: "In a bustling town far away, Timmy discovered that 'different' was just another word for 'exciting.' He tried a 'spicy puff ball' that made his eyes water and his mouth dance! He laughed with strangers who soon became friends. He learned that every culture has its own rhythm and every person has a story worth hearing. By opening his mind to new flavors and sounds, Timmy's world became a thousand times larger than the village he left behind."
      },
      {
        title: "The Strength in the Storm",
        text: "But adventure has its shadows. One night, a fierce storm trapped Timmy under a giant tree. Cold, muddy, and alone, he missed his warm bed. But then he remembered his mother's words: 'Brave hearts don’t shine only in the sun—they glow in the dark too.' He sang a soft song against the thunder. When the sun rose the next morning, Timmy wasn't just drier; he was tougher. He learned that challenges are just the 'loading screens' of life—you must wait them out to reach the next level."
      },
      {
        title: "The Forest of Connection",
        text: "In the deep forest, Timmy found a campfire surrounded by children he had never met. Instead of hiding, he joined them. They shared mangoes and stories, playing games with sticks and stones. Timmy realized that no matter how far you travel, kindness is a universal language. He showed them his map, and they showed him their songs. The forest was no longer a maze of trees; it was a network of friends. He wasn't just a traveler anymore; he was a connector."
      },
      {
        title: "The Return of the Hero",
        text: "When Timmy finally climbed the last hill home, his shoes were dusty and his bag was torn, but his spirit was glowing. He told his village of the spicy foods, the rainy nights, and the forest friends. He was the same Timmy, but with a 'new version' of his soul installed. He looked at the stars that night and whispered, 'Thank you, world.' He realized that the greatest treasure wasn't a castle or gold, but the bravery he found within himself."
      }
    ];

    const colors = ['#f8fafc', '#fffbeb', '#f0fdf4', '#eff6ff', '#fdf2f8', '#f5f3ff'];
    let currentPage = 0;

    function updateUI() {
        const container = document.getElementById("story-container");
        const pg = story[currentPage];
        
        // Progress Bar
        document.getElementById('bar').style.width = ((currentPage + 1) / story.length * 100) + '%';
        
        // Navigation Buttons
        document.getElementById('prevBtn').disabled = currentPage === 0;
        document.getElementById('nextBtn').innerText = currentPage === story.length - 1 ? "Finish" : "Next →";

        // Render with Animation
        container.innerHTML = `
            <div class="book-page" style="background-color:${colors[currentPage]}; opacity: 0; transform: scale(0.95);">
                <span class="meta-text">LOG ENTRY: 0${currentPage + 1}</span>
                <h2>${pg.title}</h2>
                <p>${pg.text}</p>
            </div>
        `;

        setTimeout(() => {
            const el = container.querySelector('.book-page');
            el.style.opacity = '1';
            el.style.transform = 'scale(1)';
        }, 50);
    }

    function changePage(dir) {
        if (dir === 1 && currentPage < story.length - 1) {
            currentPage++;
            updateUI();
        } else if (dir === -1 && currentPage > 0) {
            currentPage--;
            updateUI();
        } else if (dir === 1 && currentPage === story.length - 1) {
            // Redirect to index when story ends
            window.location.href = "../index.html"; 
        }
    }

    updateUI();
    </script>
</body>
</html>
