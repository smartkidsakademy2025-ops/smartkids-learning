<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 6: Shift Mastery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  </head>
<body class="bg-slate-50 min-h-screen font-sans">
  <div id="mission-overlay" class="fixed inset-0 z-[100] bg-slate-900/95 flex items-center justify-center p-6">
    <div class="bg-white max-w-xl w-full rounded-[2.5rem] p-10 shadow-2xl text-center">
      <div class="text-6xl mb-4">⬆️</div>
      <h2 class="text-3xl font-black mb-4">The Shift Rule</h2>
      <div class="text-slate-600 space-y-4 mb-8">
        <p><strong>The Law of Opposites:</strong> To type a capital letter, use the <b>Shift Key</b> on the opposite side of the keyboard.</p>
        <p class="bg-blue-50 p-3 rounded-lg border border-blue-100 text-sm italic">Example: To type 'A', hold the RIGHT Shift. To type 'L', hold the LEFT Shift.</p>
      </div>
      <button onclick="startMission()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl text-xl">Start Capitalization! 🚀</button>
    </div>
  </div>

  <main class="max-w-4xl mx-auto py-10 px-6">
      <div id="target-box" class="text-9xl font-black text-center mb-8 h-32 flex items-center justify-center">A</div>
      <p id="instruction" class="text-center font-bold text-blue-600 uppercase mb-8">Hold Right Shift + A</p>
      
      <div class="bg-slate-900 p-12 rounded-[3rem] shadow-2xl flex justify-center gap-4">
          <div class="key-cap bg-white w-24 h-14 rounded-lg flex items-center justify-center font-bold" id="K-LSHIFT">L-SHIFT</div>
          <div class="key-cap bg-white w-14 h-14 rounded-lg flex items-center justify-center font-bold" id="K-LETTER">?</div>
          <div class="key-cap bg-white w-24 h-14 rounded-lg flex items-center justify-center font-bold" id="K-RSHIFT">R-SHIFT</div>
      </div>
  </main>

  <script>
    const leftSide = "QWERTASDFGZXCVB";
const rightSide = "YUIOPHJKLNM";

window.addEventListener('keydown', (e) => {
    if (!missionActive) return;
    
    const target = document.getElementById('target-box').innerText;
    const isLeftTarget = leftSide.includes(target);
    const pressedKey = e.key.toUpperCase();

    // Check if Shift is held AND the correct letter is pressed
    if (e.shiftKey && pressedKey === target) {
        
        // e.location 1 = Left Shift | 2 = Right Shift
        let correctShift = false;
        
        if (isLeftTarget && e.location === 2) {
            correctShift = true; // Left letter + Right Shift = SUCCESS
        } else if (!isLeftTarget && e.location === 1) {
            correctShift = true; // Right letter + Left Shift = SUCCESS
        }

        if (correctShift) {
            handleSuccess(); // Move to next letter
        } else {
            // Shake the target box or show a hint
            showErrorHint("Wrong Shift! Use your OTHER hand for Shift.");
        }
    }
});

function showErrorHint(msg) {
    const hint = document.getElementById('instruction');
    hint.innerText = msg;
    hint.classList.add('text-red-500', 'animate-bounce');
    setTimeout(() => hint.classList.remove('text-red-500', 'animate-bounce'), 1000);
}
  </script>
</body>
</html>
