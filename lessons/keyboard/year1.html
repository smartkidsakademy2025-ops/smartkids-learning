<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Year 1: Keyboard Mastery | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .key-cap { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; border-bottom: 4px solid #cbd5e1; background: white; transition: all 0.15s; font-size: 0.9rem; }
    .key-active { background: #f97316 !important; color: white !important; border-color: #ea580c !important; transform: translateY(2px); border-bottom-width: 2px; }
    .key-success { background: #22c55e !important; color: white !important; border-color: #16a34a !important; }
    .mission-tab { border-bottom: 4px solid transparent; transition: all 0.3s; opacity: 0.4; }
    .mission-tab.active { border-color: #f97316; opacity: 1; color: #f97316; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

  <nav class="bg-white border-b py-4 px-6 flex justify-between items-center sticky top-0 z-50">
    <a href="../keyboard.html" class="text-orange-600 font-bold flex items-center gap-2"><span>←</span> Hub</a>
    <div class="flex gap-6">
        <div id="tab-0" class="mission-tab active font-black text-[10px] uppercase tracking-widest">1. Geography</div>
        <div id="tab-1" class="mission-tab font-black text-[10px] uppercase tracking-widest">2. Finding Letters</div>
        <div id="tab-2" class="mission-tab font-black text-[10px] uppercase tracking-widest">3. Alphabet Map</div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto py-10 px-6">
    <div class="bg-white p-8 rounded-[2rem] shadow-xl text-center border-b-8 border-slate-200 mb-8">
        <h2 id="mission-title" class="text-orange-500 font-black uppercase text-sm mb-2 tracking-tighter">Mission: Keyboard Geography</h2>
        <p id="mission-desc" class="text-slate-500 text-sm mb-6">Explore the rows! Press any key in the highlighted row.</p>
        <div id="target-box" class="text-7xl font-black text-slate-800 h-24 flex items-center justify-center italic">
            READY?
        </div>
    </div>

    <div class="bg-slate-900 p-6 rounded-[2rem] shadow-2xl overflow-x-auto">
        <div class="flex flex-col gap-2 min-w-[600px] items-center" id="kb-container">
            </div>
    </div>
  </main>

  <script>
    const kbLayout = [
        ["Q","W","E","R","T","Y","U","I","O","P"],
        ["A","S","D","F","G","H","J","K","L"],
        ["Z","X","C","V","B","N","M"]
    ];

    let currentMission = 0;
    let step = 0;

    // Mission Data
    const missions = [
        { title: "Keyboard Geography", desc: "Explore the Rows! Press the highlighted keys.", targets: ["TOP ROW", "MIDDLE ROW", "BOTTOM ROW"] },
        { title: "Finding Letters", desc: "Can you find these specific letters?", targets: ["S", "K", "I", "L", "Z"] },
        { title: "Alphabet Map", desc: "Type the alphabet in order (A-Z).", targets: "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("") }
    ];

    function buildKeyboard() {
        const container = document.getElementById('kb-container');
        container.innerHTML = '';
        kbLayout.forEach((row, rIdx) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = `flex gap-2 ${rIdx === 1 ? 'ml-4' : (rIdx === 2 ? 'ml-8' : '')}`;
            rowDiv.id = `row-${rIdx}`;
            row.forEach(key => {
                const k = document.createElement('div');
                k.id = `K-${key}`;
                k.className = "key-cap";
                k.innerText = key;
                rowDiv.appendChild(k);
            });
            container.appendChild(rowDiv);
        });
    }

    function runMission() {
        const m = missions[currentMission];
        document.getElementById('mission-title').innerText = `Mission: ${m.title}`;
        document.getElementById('mission-desc').innerText = m.desc;
        
        const target = m.targets[step];
        document.getElementById('target-box').innerText = target;

        // Visual Highlighting Logic
        document.querySelectorAll('.key-cap').forEach(k => k.classList.remove('key-active'));
        
        if (currentMission === 0) { // Geography logic: highlight whole rows
            document.querySelectorAll(`#row-${step} .key-cap`).forEach(k => k.classList.add('key-active'));
        } else { // Letter finding logic
            const keyEl = document.getElementById(`K-${target}`);
            if(keyEl) keyEl.classList.add('key-active');
        }
    }

    window.addEventListener('keydown', (e) => {
        const pressed = e.key.toUpperCase();
        const m = missions[currentMission];
        const target = m.targets[step];
        let correct = false;

        if (currentMission === 0) { // Geography check: is key in the active row?
            correct = kbLayout[step].includes(pressed);
        } else { // Direct key check
            correct = (pressed === target);
        }

        if (correct) {
            const el = document.getElementById(`K-${pressed}`);
            if(el) el.classList.add('key-success');
            
            setTimeout(() => {
                if(el) el.classList.remove('key-success');
                step++;
                if (step >= m.targets.length) {
                    advanceMission();
                } else {
                    runMission();
                }
            }, 300);
        }
    });

    function advanceMission() {
        document.getElementById(`tab-${currentMission}`).classList.remove('active');
        currentMission++;
        step = 0;
        if (currentMission < missions.length) {
            document.getElementById(`tab-${currentMission}`).classList.add('active');
            runMission();
        } else {
            document.getElementById('target-box').innerText = "🏆 COMPLETE";
            document.getElementById('mission-desc').innerText = "You have mastered Year 1!";
        }
    }

    buildKeyboard();
    runMission();
  </script>
</body>
</html>

  <script>

    let currentIdx = 0;

    function nextLetter() {
        if(currentIdx >= alphabet.length) {
            document.getElementById('feedback-msg').innerText = "🏆 GEOGRAPHY MASTERED!";
            document.getElementById('target-char').innerText = "⭐";
            return;
        }

        const char = alphabet[currentIdx];
        document.getElementById('target-char').innerText = char;
        
        // Remove old highlights
        document.querySelectorAll('.key-cap').forEach(k => k.classList.remove('key-highlight'));
        
        // Highlight the one to find
        const targetKey = document.getElementById('K-' + char);
        if(targetKey) targetKey.classList.add('key-highlight');
    }

    window.addEventListener('keydown', (e) => {
        const pressed = e.key.toUpperCase();

        if(pressed === target) {

            }, 600);

  </script>

<!--<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Year 1: Keyboard Hunt | SmartKids Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .key-cap {
      box-shadow: 0 8px 0 px #cbd5e1, 0 12px 20px rgba(0,0,0,0.1);
      transition: all 0.1s ease;
    }
    .key-pressed {
      transform: translateY(4px);
      box-shadow: 0 4px 0 px #cbd5e1, 0 4px 10px rgba(0,0,0,0.1);
      background-color: #fef08a !important; /* Yellow-200 */
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .target-letter { animation: bounce 1s infinite; }
  </style>
</head>
<body class="bg-orange-50 text-slate-900 font-sans min-h-screen flex flex-col">

  <nav class="bg-white border-b py-4 px-6 flex justify-between items-center shadow-sm">
    <a href="../keyboard-practice.html" class="text-orange-600 font-bold flex items-center gap-2">
      <span>←</span> Back to Hub
    </a>
    <div class="text-slate-500 font-medium text-sm">Year 1: Finding Letters</div>
  </nav>

  <main class="flex-grow max-w-4xl mx-auto py-8 px-4 w-full text-center">
    <header class="mb-8">
      <h1 class="text-3xl font-extrabold text-orange-800">The Letter Hunt! 🔍</h1>
      <p class="text-slate-600 mt-2">Look at the big letter and find it on your keyboard!</p>
    </header>

    <div class="bg-white rounded-3xl p-12 shadow-xl border-4 border-orange-200 relative overflow-hidden mb-8">
      <div id="game-screen">
        <div id="instruction-text" class="text-xl font-bold text-slate-400 mb-4">Press any key to start...</div>
        <div id="display-letter" class="text-9xl font-black text-orange-500 target-letter">?</div>
      </div>
      
      <div id="feedback" class="hidden absolute inset-0 flex items-center justify-center bg-green-500/90 text-white text-6xl font-bold">
        GREAT! ✅
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-12">
      <div class="bg-orange-100 p-4 rounded-2xl border-2 border-orange-200">
        <div class="text-xs uppercase font-bold text-orange-600">Score</div>
        <div id="score" class="text-2xl font-black">0</div>
      </div>
      <div class="bg-blue-100 p-4 rounded-2xl border-2 border-blue-200">
        <div class="text-xs uppercase font-bold text-blue-600">Level</div>
        <div id="level" class="text-2xl font-black">1</div>
      </div>
    </div>

    <section class="bg-white p-6 rounded-2xl border border-slate-200 text-left">
      <h3 class="font-bold text-orange-700 flex items-center gap-2">
        <span>💡</span> Smart Tip:
      </h3>
      <p class="text-sm text-slate-600 mt-2">
        The letters on your keyboard are not in "A-B-C" order. They are in <strong>Q-W-E-R-T-Y</strong> order. This helps people type faster once they learn where the letters are hiding!
      </p>
    </section>
  </main>

  <script>
    const displayLetter = document.getElementById('display-letter');
    const instructionText = document.getElementById('instruction-text');
    const scoreEl = document.getElementById('score');
    const feedback = document.getElementById('feedback');
    
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let currentLetter = "";
    let score = 0;
    let gameStarted = false;

    function nextLetter() {
      const randomIndex = Math.floor(Math.random() * alphabet.length);
      currentLetter = alphabet[randomIndex];
      displayLetter.innerText = currentLetter;
      instructionText.innerText = "Can you find...";
      displayLetter.classList.add('target-letter');
    }

    document.addEventListener('keydown', (event) => {
      if (!gameStarted) {
        gameStarted = true;
        nextLetter();
        return;
      }

      const pressedKey = event.key.toUpperCase();

      if (pressedKey === currentLetter) {
        score++;
        scoreEl.innerText = score;
        
        // Show feedback
        feedback.classList.remove('hidden');
        displayLetter.classList.remove('target-letter');
        
        setTimeout(() => {
          feedback.classList.add('hidden');
          nextLetter();
        }, 600);
      } else {
        // Shaking effect for wrong key
        displayLetter.classList.add('text-red-500');
        setTimeout(() => displayLetter.classList.remove('text-red-500'), 200);
      }
    });
  </script>
</body>
</html>
