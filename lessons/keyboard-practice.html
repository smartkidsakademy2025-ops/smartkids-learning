<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboarding Hub | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .year-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
    .unlocked:hover { transform: translateY(-10px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

  <header class="py-12 px-6 text-center bg-white border-b-4 border-slate-100">
    <h1 class="text-4xl font-black text-slate-800 mb-2">Keyboarding Academy</h1>
    <p class="text-slate-500 font-medium">Master the keys, unlock your future.</p>
  </header>

 <main class="max-w-6xl mx-auto py-12 px-6">
    
    <h2 class="text-xl font-black text-slate-400 mb-6 uppercase tracking-widest">Foundations</h2>
    <div id="tier-foundations" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12"></div>

    <h2 class="text-xl font-black text-slate-400 mb-6 uppercase tracking-widest">Professional</h2>
    <div id="tier-professional" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12"></div>

    <h2 class="text-xl font-black text-slate-400 mb-6 uppercase tracking-widest">Expert & Graduation</h2>
    <div id="tier-expert" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12"></div>

    <div id="grad-container" class="mt-12 text-center hidden">
        <button class="bg-amber-400 text-black px-12 py-6 rounded-[2rem] font-black text-2xl shadow-2xl hover:scale-105 transition-all">
            🎓 CLAIM YOUR DIPLOMA
        </button>
    </div>

</main>

<script>
    const years = [
        { id: 1, name: "Geography", icon: "🗺️" },
        { id: 2, name: "Home Row", icon: "🏠" },
        { id: 3, name: "Top Reach", icon: "🚀" },
        { id: 4, name: "Bottom Curl", icon: "⚓" },
        { id: 5, name: "Power Keys", icon: "⚡" },
        { id: 6, name: "Shift Rule", icon: "⬆️" },
        { id: 7, name: "Symbols", icon: "⌨️" },
        { id: 8, name: "Common Words", icon: "📝" },
        { id: 9, name: "Shortcuts", icon: "✂️" },
        { id: 10, name: "The Flow", icon: "🌊" },
        { id: 11, name: "Navigation", icon: "🧭" },
        { id: 12, name: "Dev Mode", icon: "💻" }
    ];

    // --- COOKIE HELPERS ---
    function setCookie(name, value) {
        const d = new Date();
        d.setTime(d.getTime() + (24*60*60*1000)); // 24 Hours
        document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/;SameSite=Lax";
    }

    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

    function loadHub() {
        const urlParams = new URLSearchParams(window.location.search);
        let unlockedParam = urlParams.get('unlocked');
        
        // 1. If URL has it, save it (instant unlock)
        if (unlockedParam) {
            setCookie('typing_progress', unlockedParam);
        }

        // 2. Get current progress from Cookie or default to 1
        const progress = parseInt(unlockedParam || getCookie('typing_progress')) || 1;

        // Clear tiers before loading (prevents double-loading)
        document.getElementById('tier-foundations').innerHTML = '';
        document.getElementById('tier-professional').innerHTML = '';
        document.getElementById('tier-expert').innerHTML = '';

        years.forEach(year => {
            const isLocked = year.id > progress;
            const card = document.createElement('div');
            
            let tierId = "tier-foundations";
            if (year.id > 4) tierId = "tier-professional";
            if (year.id > 8) tierId = "tier-expert";

            card.className = `p-6 rounded-[2rem] text-center border-b-4 transition-all ${isLocked ? 'bg-slate-100 border-slate-200 grayscale opacity-50 cursor-not-allowed' : 'bg-white border-blue-500 shadow-xl cursor-pointer hover:-translate-y-2'}`;
            
            card.innerHTML = `
                <div class="text-4xl mb-2">${year.icon}</div>
                <h3 class="font-black text-slate-800">Year ${year.id}</h3>
                <p class="text-[10px] uppercase font-bold text-slate-400">${year.name}</p>
                ${isLocked ? '<div class="mt-2 text-xs text-slate-300">🔒 Locked</div>' : ''}
            `;

            if (!isLocked) {
                // Ensure link points to the same folder or root
                card.onclick = () => window.location.href = `year${year.id}.html`;
            }

            document.getElementById(tierId).appendChild(card);
        });

        if (progress > 12) {
            document.getElementById('grad-container').classList.remove('hidden');
        }
    }

    // Run on load
    window.onload = loadHub;
</script>
 
</body>
</html>
