<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 2: Treasure Hunt | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .folder-grid { display: grid; grid-template-cols: repeat(auto-fill, minmax(100px, 1fr)); gap: 1.5rem; }
    .folder-item { transition: all 0.2s; }
    .folder-item.hidden { display: none; }
    .found-animation { animation: bounce 0.5s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-8 font-sans">

  <div class="max-w-4xl mx-auto">
  <header class="text-center mb-10">
    <h1 class="text-4xl font-black text-slate-800 tracking-tight">The Search Mission</h1>
    
    <div id="missionBox" class="mt-6 inline-block bg-amber-100 border-2 border-amber-400 p-4 rounded-2xl shadow-sm">
        <p class="text-amber-700 font-bold uppercase tracking-tighter text-[10px]">Current Mission:</p>
        <h2 id="instructionText" class="text-2xl font-black text-slate-800">Find: Gold_Coin</h2>
    </div>
  </header>

  <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-8 flex items-center gap-4 border-2 border-blue-500">
    <span class="text-2xl">🔍</span>
    <input type="text" id="searchBar" placeholder="Type name and press ENTER..." 
           class="w-full text-xl outline-none font-semibold text-slate-700">
  </div>

  <div id="folderContainer" class="folder-grid bg-white p-10 rounded-[3rem] shadow-inner min-h-[400px]">
    </div>

  <div id="winMessage" class="hidden fixed inset-0 bg-blue-600/90 flex items-center justify-center z-50">
    <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl">
      <div class="text-7xl mb-4 found-animation">🏆</div>
      <h2 class="text-3xl font-black mb-2">Search Master!</h2>
      <p class="text-slate-500 mb-6">You found all the missing files using the search tool.</p>
      <button onclick="window.location.href='year3.html'" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition">
        Next Year: The Rescue
      </button>
    </div>
  </div>
</div>
<script>
    const files = [
      "Homework", "Family_Photo", "Drum_Beat", "Recipe", "Game_Save", 
      "Gold_Coin", "School_Project", "Old_Music", "Vacation", "Ideas",
      "Draft_1", "Draft_2", "Secret_Map", "Banana", "Zebra", "Computer_Drawing"
    ];

    // The sequence of targets to find for this session
    const missionList = ["Gold_Coin", "School_Project", "Family_Photo"];
    let currentMissionIndex = 0;

    const container = document.getElementById('folderContainer');
    const searchBar = document.getElementById('searchBar');
    const instructionText = document.getElementById('instructionText');

    function initGame() {
      container.innerHTML = '';
      // Create a fresh shuffle of all files
      const shuffled = [...files].sort(() => Math.random() - 0.5);
      
      shuffled.forEach(name => {
        const div = document.createElement('div');
        div.className = 'folder-item flex flex-col items-center text-center p-2';
        div.setAttribute('data-name', name.toLowerCase());
        
        // Use a coin icon only for the Gold_Coin file
        const icon = name === "Gold_Coin" ? "🪙" : "📁";
        
        div.innerHTML = `
          <div class="text-5xl mb-1">${icon}</div>
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${name}</span>
        `;
        container.appendChild(div);
      });
      updateInstruction();
    }

    function updateInstruction() {
        instructionText.innerText = `Find: ${missionList[currentMissionIndex]}`;
    }

    // Visual filtering while typing
    searchBar.addEventListener('input', () => {
        const query = searchBar.value.toLowerCase();
        document.querySelectorAll('.folder-item').forEach(item => {
            const name = item.getAttribute('data-name');
            item.style.display = name.includes(query) ? 'flex' : 'none';
        });
    });

    // Handle the ENTER Key for Mission Confirmation
    searchBar.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const query = searchBar.value.toLowerCase().trim();
            const target = missionList[currentMissionIndex].toLowerCase();

            if (query === target) {
                alert(`✅ Correct! You found the ${missionList[currentMissionIndex]}!`);
                currentMissionIndex++;

                if (currentMissionIndex < missionList.length) {
                    // Start next mission immediately
                    searchBar.value = "";
                    initGame(); // Reshuffles positions for the next target
                } else {
                    // Final Win for the session
                    document.getElementById('winMessage').classList.remove('hidden');
                }
            } else {
                alert("❌ Not quite. Make sure the spelling matches the mission and press Enter!");
            }
        }
    });

    // Start fresh on every page load
    window.onload = initGame;
</script>
