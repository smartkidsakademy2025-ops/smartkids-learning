<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Practice Lab | Kidventor Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Fira+Code:wght@400;500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .code-font { font-family: 'Fira Code', monospace; }

        .editor-focus:focus-within {
            ring: 4px; ring-color: rgba(14, 165, 233, 0.2); border-color: #0ea5e9;
        }

        .preview-window {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .task-card {
            transition: all 0.3s ease;
        }
        .task-card.active {
            border-color: #0ea5e9; background-color: #f0f9ff; transform: scale(1.02);
        }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white sticky top-0 z-50 border-b border-slate-200 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-9 h-9 bg-sky-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-sky-200">K</div>
                <span class="font-extrabold uppercase text-sm tracking-tight hidden md:block">Kidventor Academy</span>
            </a>
            <div id="status-badge" class="text-[10px] font-black bg-slate-100 text-slate-500 px-4 py-1.5 rounded-full uppercase tracking-widest">
                Level 1: The Basics
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid lg:grid-cols-12 gap-8">
            
            <!-- LEFT: MISSIONS -->
            <div class="lg:col-span-3 space-y-4">
                <h2 class="font-black text-xs uppercase tracking-[0.2em] text-slate-400 ml-2">Missions</h2>
                
                <div id="task1" class="task-card active p-5 rounded-[1.5rem] border-2 border-slate-200 bg-white shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-black text-sky-600 uppercase">Task 1</span>
                        <span class="check-icon hidden text-emerald-600 font-bold">DONE</span>
                    </div>
                    <p class="text-sm font-bold text-slate-700">Write a Big Heading</p>
                    <p class="text-[11px] text-slate-500 mt-1">Use &lt;h1&gt; tags.</p>
                </div>

                <div id="task2" class="task-card p-5 rounded-[1.5rem] border-2 border-slate-200 bg-white shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-black text-slate-400 uppercase">Task 2</span>
                        <span class="check-icon hidden text-emerald-600 font-bold">DONE</span>
                    </div>
                    <p class="text-sm font-bold text-slate-400">Add an Image</p>
                    <p class="text-[11px] text-slate-400 mt-1">Use the &lt;img&gt; tag.</p>
                </div>

                <div id="task3" class="task-card p-5 rounded-[1.5rem] border-2 border-slate-200 bg-white shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-black text-slate-400 uppercase">Task 3</span>
                        <span class="check-icon hidden text-emerald-600 font-bold">DONE</span>
                    </div>
                    <p class="text-sm font-bold text-slate-400">Add a Clickable Link</p>
                    <p class="text-[11px] text-slate-400 mt-1">Use the &lt;a&gt; tag.</p>
                </div>
            </div>

            <!-- CENTER: EDITOR -->
            <div class="lg:col-span-5 space-y-6">
                <div class="editor-focus transition-all bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl relative border-4 border-slate-800">
                    <div class="flex items-center justify-between mb-4 border-b border-white/10 pb-4">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                            <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                            <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                        </div>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">index.html</span>
                    </div>
                    
                    <textarea id="html-input" 
                        class="w-full h-[400px] bg-transparent border-none text-sky-300 code-font text-lg outline-none resize-none"
                        placeholder="Type your HTML here..."
                        spellcheck="false"></textarea>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="checkCode()" class="bg-sky-600 hover:bg-sky-700 text-white font-black py-4 px-8 rounded-2xl transition-all flex-1 shadow-lg shadow-sky-200">
                        CHECK MISSION ✅
                    </button>
                    <button onclick="saveMyCode()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 px-8 rounded-2xl transition-all shadow-lg shadow-emerald-200 flex items-center justify-center gap-2">
                        <span>SAVE MY CODE</span> 💾
                    </button>
                </div>
            </div>

            <!-- RIGHT: PREVIEW -->
            <div class="lg:col-span-4 space-y-4">
                <h2 class="font-black text-xs uppercase tracking-[0.2em] text-slate-400 ml-2">Live Preview</h2>
                <div class="bg-white rounded-[2.5rem] border-8 border-slate-200 shadow-2xl overflow-hidden aspect-[4/5] flex flex-col">
                    <div class="bg-slate-100 p-3 flex items-center gap-3">
                        <div class="bg-white rounded-md flex-1 text-[10px] text-slate-400 px-3 py-1 truncate">
                            www.kidventor-app.com
                        </div>
                    </div>
                    <div id="live-preview" class="p-8 flex-1 overflow-auto preview-window">
                        <div class="text-slate-300 text-center mt-20 italic">Start typing code to see the magic!</div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] border border-slate-200">
                    <div class="flex flex-wrap gap-2 justify-center">
                        <button onclick="insertTag('<h1>', '</h1>')" class="bg-slate-50 px-3 py-2 rounded-xl text-[10px] font-black border border-slate-100 hover:bg-sky-50 transition">&lt;h1&gt;</button>
                        <button onclick="insertTag('<p>', '</p>')" class="bg-slate-50 px-3 py-2 rounded-xl text-[10px] font-black border border-slate-100 hover:bg-sky-50 transition">&lt;p&gt;</button>
                        <button onclick="insertTag('<img src=\'https://placehold.co/200x150\' alt=\'cool photo\'>', '')" class="bg-slate-50 px-3 py-2 rounded-xl text-[10px] font-black border border-slate-100 hover:bg-sky-50 transition">&lt;img&gt;</button>
                        <button onclick="insertTag('<a href=\'#\'>', '</a>')" class="bg-slate-50 px-3 py-2 rounded-xl text-[10px] font-black border border-slate-100 hover:bg-sky-50 transition">&lt;a&gt;</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const htmlInput = document.getElementById('html-input');
        const livePreview = document.getElementById('live-preview');
        let currentTask = 1;

        htmlInput.addEventListener('input', () => {
            livePreview.innerHTML = htmlInput.value || '<div class="text-slate-300 text-center mt-20 italic">Start typing code to see the magic!</div>';
        });

        function insertTag(open, close) {
            const start = htmlInput.selectionStart;
            const end = htmlInput.selectionEnd;
            const text = htmlInput.value;
            htmlInput.value = text.substring(0, start) + open + close + text.substring(end);
            htmlInput.dispatchEvent(new Event('input'));
            htmlInput.focus();
        }

        function checkCode() {
            const code = htmlInput.value.toLowerCase();
            
            if (currentTask === 1 && code.includes('<h1>') && code.includes('</h1>')) {
                completeTask(1, 2, "Level 2: Visuals");
            } else if (currentTask === 2 && code.includes('<img')) {
                completeTask(2, 3, "Level 3: Navigation");
            } else if (currentTask === 3 && code.includes('<a') && code.includes('</a>')) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                document.getElementById('task3').querySelector('.check-icon').classList.remove('hidden');
                document.getElementById('status-badge').innerText = "Developer Mastered! 🎉";
                document.getElementById('status-badge').className = "text-[10px] font-black bg-emerald-500 text-white px-4 py-1.5 rounded-full uppercase tracking-widest";
            } else {
                alert("Almost there! Make sure you are using the correct tags for the current mission.");
            }
        }

        function completeTask(current, next, statusLabel) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            document.getElementById('task' + current).classList.remove('active');
            document.getElementById('task' + current).querySelector('.check-icon').classList.remove('hidden');
            
            const nextCard = document.getElementById('task' + next);
            nextCard.classList.add('active');
            nextCard.querySelectorAll('p, span').forEach(el => {
                el.classList.remove('text-slate-400');
                if(el.tagName === 'SPAN') el.classList.add('text-sky-600');
                else el.classList.add('text-slate-700');
            });

            document.getElementById('status-badge').innerText = statusLabel;
            currentTask = next;
        }

        function saveMyCode() {
            const code = htmlInput.value;
            if (!code) return alert("Write some code first!");
            const blob = new Blob([code], { type: "text/html" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "kidventor-project.html";
            a.click();
        }
    </script>
</body>
</html>
