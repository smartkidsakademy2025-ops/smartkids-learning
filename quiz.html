<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Arena | Kidventor Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .option-btn { transition: all 0.2s ease; border: 2px solid #e2e8f0; }
        .option-btn:hover { border-color: #0284c7; background: #f0f9ff; transform: scale(1.02); }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="loader" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-600 mx-auto"></div>
        <p class="mt-4 text-slate-500 font-bold">Downloading ICT Module...</p>
    </div>

    <main id="quiz-ui" class="hidden w-full max-w-2xl bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
        
        <div class="flex justify-between items-center mb-8">
            <span id="level-name" class="bg-sky-100 text-sky-700 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Level</span>
            <div class="text-slate-400 font-bold text-sm">Question <span id="q-current" class="text-sky-600">1</span>/<span id="q-total">0</span></div>
        </div>

        <h2 id="question-text" class="text-2xl font-extrabold text-slate-800 mb-8 leading-tight text-center">
            Loading...
        </h2>

        <div id="options-grid" class="grid grid-cols-1 gap-4 mb-8">
            </div>

        <div class="pt-6 border-t border-slate-100 flex justify-between items-center">
            <div class="text-xs font-black text-slate-400 uppercase">Score: <span id="score-val" class="text-sky-600 text-lg">0</span></div>
            <div id="timer" class="font-mono font-bold text-rose-500 bg-rose-50 px-4 py-1 rounded-lg italic">30s</div>
        </div>
    </main>

    <script>
        // 1. GET THE LEVEL FROM THE URL
        const params = new URLSearchParams(window.location.search);
        const levelKey = params.get('level') || 'level1';

        // 2. STATE VARIABLES
        let quizData = [];
        let currentIndex = 0;
        let score = 0;
        let timer;

        // 3. THE POPULATOR FUNCTION (Fetch JSON from data folder)
        async function initQuiz() {
            try {
                const response = await fetch(`data/${levelKey}.json`);
                if (!response.ok) throw new Error("Data not found");
                
                const data = await response.json();
                quizData = data.questions;

                // Update UI Labels
                document.getElementById('level-name').innerText = data.levelName;
                document.getElementById('q-total').innerText = quizData.length;
                
                // Switch from Loader to Quiz
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('quiz-ui').classList.remove('hidden');

                displayQuestion();
            } catch (err) {
                document.getElementById('loader').innerHTML = `<p class="text-red-500 font-black">ERROR: data/${levelKey}.json not found!</p>`;
            }
        }

        // 4. DISPLAY THE CURRENT QUESTION
        function displayQuestion() {
            if (currentIndex >= quizData.length) return endQuiz();

            const q = quizData[currentIndex];
            document.getElementById('q-current').innerText = currentIndex + 1;
            document.getElementById('question-text').innerText = q.q;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = ''; // Clear previous level's data

            q.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full p-5 rounded-2xl font-bold text-left bg-slate-50 text-slate-700";
                btn.innerText = option;
                btn.onclick = () => checkAnswer(index, btn);
                grid.appendChild(btn);
            });

            startTimer();
        }

        // 5. CHECK THE ANSWER
        function checkAnswer(selected, btn) {
            clearInterval(timer);
            const correct = quizData[currentIndex].correct;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score-val').innerText = score;
                confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
            }

            setTimeout(() => {
                currentIndex++;
                displayQuestion();
            }, 1500);
        }

        // 6. TIMER
        function startTimer() {
            clearInterval(timer);
            let timeLeft = 30;
            document.getElementById('timer').innerText = timeLeft + "s";
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    checkAnswer(-1, null);
                }
            }, 1000);
        }

        function endQuiz() {
            const pass = score >= 5;
            if(pass) {
                localStorage.setItem('unlock_' + levelKey, 'true');
            }
            
            document.getElementById('quiz-ui').innerHTML = `
                <div class="text-center py-10">
                    <h2 class="text-4xl font-black mb-4">${pass ? 'MISSION COMPLETE! 🏆' : 'RETRY NEEDED ⛔'}</h2>
                    <p class="text-slate-500 mb-8 leading-relaxed">You scored ${score} out of ${quizData.length}.<br>${pass ? 'The next level is now unlocked in the Arena!' : 'You need at least 5 points to pass.'}</p>
                    <button onclick="location.href='index.html'" class="bg-sky-600 text-white px-8 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-sky-700 transition-all">Return to Arena</button>
                </div>
            `;
        }

        initQuiz();
    </script>
</body>
</html>
